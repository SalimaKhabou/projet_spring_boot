spring.application.name=projet_jee



# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# Adaptez le port (3306 ou 3307) et le nom de la base selon votre config locale

# spring.datasource.url=jdbc:mysql://localhost:3307/projetspring_db 
spring.datasource.url=jdbc:mysql://localhost:8889/projetspring_db
spring.datasource.username=root
# spring.datasource.password=
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# MySQLDialect : dialecte adapt� � MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# update : Hibernate met � jour le sch�ma sans supprimer les donn�es existantes
# create : recr�� le sch�ma � chaque d�marrage (utile en dev, dangereux en prod)
spring.jpa.hibernate.ddl-auto=update

# Affiche les requ�tes SQL g�n�r�es dans la console (utile pour le d�bogage)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER CONFIG
# ===============================
server.port=8089
server.servlet.context-path=/

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10

# ===============================
# JACKSON / LAZY LOADING FIX
# ===============================
# �vite les erreurs de s�rialisation sur les beans vides
spring.jackson.serialization.fail-on-empty-beans=false

# Permet le chargement LAZY hors transaction (�vite LazyInitializationException)
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===============================
# SWAGGER / SPRINGDOC
# ===============================
# Swagger UI accessible � : http://localhost:8089/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs